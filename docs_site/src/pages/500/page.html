{% extends "html/base.html" %}

{% block title %}Server Error | Asok Framework{% endblock %}


{% block main %}
<div class="relative min-h-[80vh] flex flex-col items-center justify-center text-center px-6 overflow-hidden">
    <!-- Background Decoration -->
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-red-500/10 blur-[120px] rounded-full -z-10">
    </div>

    <div class="relative z-10 space-y-8 max-w-2xl">
        <!-- Shaking Icon -->
        <div class="shake-animation mb-12">
            <div class="relative inline-block">
                <div class="absolute inset-0 bg-red-500/20 blur-2xl rounded-full"></div>
                <div class="relative bg-red-500/10 border border-red-500/20 p-8 rounded-[2.5rem] backdrop-blur-xl">
                    <svg class="w-20 h-20 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
            </div>
        </div>

        <h1 class="text-8xl md:text-9xl font-black tracking-tighter text-shimmer-red error-glow-red">
            500
        </h1>

        <div class="space-y-4">
            <h2 class="text-4xl font-bold tracking-tight" style="color: var(--text-primary)">
                Unexpected Turbulence.
            </h2>
            <p class="text-lg md:text-xl font-medium max-w-md mx-auto" style="color: var(--text-secondary)">
                Our servers are experiencing some internal chaos. We're on it, but meanwhile, you might want to head
                back.
            </p>
        </div>

        <div class="pt-8">
            <a href="/" class="btn-primary-red-custom">
                Safe Harbor
            </a>
        </div>
    </div>

    <!-- Background Elements -->
    <div class="absolute bottom-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-red-500/20 to-transparent">
    </div>
</div>
{% endblock %}
